name: Unscroll
options:
  bundleId: com.unscroll.app
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    INFOPLIST_FILE: Sources/App/Info.plist

targets:
  Unscroll:
    type: application
    platform: iOS
    sources:
      - path: Sources
        type: group
    dependencies:
      - package: Supabase
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.unscroll.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: false
        SWIFT_EMIT_LOC_STRINGS: "YES"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    entitlements:
      path: Sources/App/Unscroll.entitlements
      properties:
        com.apple.developer.family-controls: true

schemes:
  Unscroll:
    build:
      targets:
        Unscroll: all
    run:
      config: Debug
    archive:
      config: Release
